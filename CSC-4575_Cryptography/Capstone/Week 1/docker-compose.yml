version: '3.8'

services:
  bob_node:
    image: python:3.11-slim
    container_name: bob_node
    # Mount the current directory into the container
    volumes:
      - ./:/app
    working_dir: /app
    # Install the cryptography library, then keep the container alive
    command: bash -c "pip install cryptography && sleep infinity"
    networks:
      - crypto_net

  alice_node:
    image: python:3.11-slim
    container_name: alice_node
    volumes:
      - ./:/app
    working_dir: /app
    command: bash -c "pip install cryptography && sleep infinity"
    networks:
      - crypto_net
    depends_on:
      - bob_node

networks:
  crypto_net:
    driver: bridge
    driver_opts:
      # Hardcode the bridge interface name for easy Wireshark capture
      com.docker.network.bridge.name: br-crypto